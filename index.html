<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>⚽ World Cup 2026 Live</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --pitch:#0a2e1a;--grass:#0d3d24;--turf:#134d2e;
  --gold:#f5c842;--white:#f0f4f0;--muted:#8aaa96;
  --card:#0f3d22;--live:#e53935;--live-glow:rgba(229,57,53,.3);
  --done:#4caf70;--up:#5b8c71;--border:#1e5434;--text:#d6ead0;
}
body{font-family:'Inter',sans-serif;background:var(--pitch);color:var(--text);min-height:100vh;max-width:480px;margin:0 auto;padding-bottom:40px}

/* HEADER & TABS */
header{background:var(--grass);padding:13px 13px 10px;border-bottom:2px solid var(--border);position:sticky;top:0;z-index:100}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.logo{display:flex;align-items:center;gap:8px}
.logo-ball{font-size:22px}
.logo-text h1{font-size:15px;font-weight:900;color:var(--gold);letter-spacing:-.3px;line-height:1}
.logo-text p{font-size:9px;color:var(--muted);font-weight:500;text-transform:uppercase;letter-spacing:1px}
.header-actions{display:flex;gap:5px}
.icon-btn{background:var(--turf);border:1px solid var(--border);color:var(--gold);border-radius:8px;padding:6px 9px;font-size:12px;cursor:pointer;display:flex;align-items:center;gap:3px;font-weight:600;transition:all .2s;white-space:nowrap}
.icon-btn:active{transform:scale(.92)}
.spin{display:inline-block;line-height:1}
.spin.go{animation:spin .6s linear}
@keyframes spin{to{transform:rotate(360deg)}}
.tabs{display:flex;gap:5px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px;}
.tabs::-webkit-scrollbar{display:none}
.tab{background:transparent;border:1px solid var(--border);color:var(--muted);border-radius:20px;padding:5px 12px;font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap;flex-shrink:0;transition:all .2s}
.tab.active{background:var(--gold);border-color:var(--gold);color:var(--pitch)}

/* STATUS */
.status-bar{padding:6px 13px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);background:var(--grass)}
.live-indicator{display:flex;align-items:center;gap:5px;font-size:11px;font-weight:700;color:var(--live)}
.live-dot{width:7px;height:7px;background:var(--live);border-radius:50%;animation:pulse 1.5s infinite}
@keyframes pulse{0%{box-shadow:0 0 0 0 var(--live-glow)}70%{box-shadow:0 0 0 6px transparent}100%{box-shadow:0 0 0 0 transparent}}
.last-upd{font-size:10px;color:var(--muted)}

/* CONTENT */
.content{padding:10px 11px}

/* CÀI ĐẶT MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:200;align-items:flex-end;justify-content:center}
.modal-overlay.open{display:flex}
.modal-box{background:var(--grass);border-radius:18px 18px 0 0;border:1px solid var(--border);border-bottom:none;width:100%;max-width:480px;max-height:90vh; display:flex; flex-direction:column; overflow:hidden; animation:slideup .25s ease;}
@keyframes slideup{from{transform:translateY(60px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-title{font-size:15px;font-weight:800;color:var(--gold);margin-bottom:15px;display:flex;justify-content:space-between;align-items:center}
.modal-close{background:var(--turf);border:none;color:var(--muted);border-radius:7px;padding:4px 9px;font-size:15px;cursor:pointer}

.s-label{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:7px}
.s-section{margin-bottom:18px}
.opt-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.opt-btn{background:var(--turf);border:2px solid var(--border);color:var(--text);border-radius:9px;padding:9px 10px;font-size:12px;font-weight:600;cursor:pointer;text-align:center;transition:all .15s;width:100%}
.opt-btn.sel{border-color:var(--gold);color:var(--gold);background:#1a5030}
.tz-list{display:flex;flex-direction:column;gap:4px;max-height:200px;overflow-y:auto}
.tz-item{background:var(--turf);border:2px solid var(--border);color:var(--text);border-radius:9px;padding:8px 11px;font-size:12px;font-weight:600;cursor:pointer;display:flex;justify-content:space-between;align-items:center;}
.tz-item.sel{border-color:var(--gold);color:var(--gold)}

/* MATCH CARD */
.date-header {font-size: 11px; font-weight: 700; color: var(--gold); text-transform: uppercase; margin: 15px 0 8px 5px; letter-spacing: 0.5px;}
.match-card{background:var(--card);border-radius:13px;border:1px solid var(--border);margin-bottom:7px;overflow:hidden;cursor:pointer;}
.match-card.live-game{border-color:var(--live);box-shadow:0 0 14px rgba(229,57,53,.18)}
.match-top{padding:11px 12px 9px}
.match-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.grp-tag{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.4px}
.s-tag{font-size:10px;font-weight:700;padding:2px 8px;border-radius:8px}
.s-tag.live{background:var(--live);color:#fff;animation:blink 1.5s infinite}
.s-tag.done{background:rgba(76,175,112,.2);color:var(--done)}
.s-tag.up{background:rgba(91,140,113,.2);color:var(--up)}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.65}}
.teams-row{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:6px}
.team-home{text-align:right}.team-away{text-align:left}
.t-flag img {width: 32px; height: 32px; object-fit: contain; margin-bottom: 3px;}
.t-name{font-size:11px;font-weight:700;color:var(--white);line-height:1.2}
.score-block{text-align:center}
.score{font-size:26px;font-weight:900;color:var(--gold);letter-spacing:-1px;line-height:1}
.m-time{font-size:10px;color:var(--muted);margin-top:3px;font-weight:500}
.m-time.lv{color:var(--live);font-weight:700}
.match-footer{padding:6px 12px 8px;display:flex;align-items:center;justify-content:space-between;border-top:1px solid var(--border);background:rgba(0,0,0,.1);gap:5px}
.venue-txt{font-size:10px;color:var(--muted);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* STANDINGS TABLE */
.std-card{background:var(--card);border-radius:13px;border:1px solid var(--border);margin-bottom:12px;overflow:hidden}
.std-hdr{padding:9px 12px;border-bottom:1px solid var(--border); background:rgba(0,0,0,0.15)}
.std-grp{font-size:13px;font-weight:800;color:var(--gold);text-transform:uppercase;}
.std-table{width:100%;border-collapse:collapse}
.std-table th{font-size:9px;font-weight:700;color:var(--muted);text-transform:uppercase;padding:8px 8px;text-align:center;background:rgba(0,0,0,0.2)}
.std-table th:first-child{text-align:left}
.std-table td{font-size:12px;padding:9px 8px;text-align:center;border-top:1px solid rgba(30,84,52,.5)}
.std-table td:first-child{text-align:left}
.tc{display:flex;align-items:center;gap:8px}
.rn{font-size:10px;color:var(--muted);width:14px;text-align:right}
.rn.q{color:var(--done);font-weight:800}
.pts{font-weight:800;color:var(--gold);font-size:13px;}

/* ==========================================
   GIAO DIỆN MODAL UPGRADE PRO CỐ ĐỊNH (STICKY)
   ========================================== */
.modal-sticky-header { padding: 18px 15px 0; background: var(--grass); border-bottom: 1px solid var(--border); z-index: 10; flex-shrink: 0; }
.modal-scroll-body { flex: 1; overflow-y: auto; padding: 15px; position: relative; scroll-behavior: smooth; }

.det-flag img {width: 50px; height: 50px; object-fit: contain;}
.det-teams{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;gap:8px}
.det-team{flex:1;text-align:center}
.det-name{font-size:13px;font-weight:700;color:var(--white);margin-top:4px}
.det-score-wrap{text-align:center}
.det-score{font-size:36px;font-weight:900;color:var(--gold);letter-spacing:-2px;line-height:1}
.det-sub{font-size:11px;color:var(--muted);margin-top:3px}
.det-sub.lv{color:var(--live);font-weight:700}

.md-tabs { display: flex; background: rgba(0,0,0,0.15); border-radius: 10px; padding: 3px; margin-bottom: 10px; border: 1px solid var(--border);}
.md-tab { flex: 1; text-align: center; padding: 8px 0; font-size: 11px; font-weight: 700; color: var(--muted); cursor: pointer; border-radius: 8px; transition: all 0.2s;}
.md-tab.active { color: var(--pitch); background: var(--gold); font-weight: 800;}
.md-content { display: none; }
.md-content.active { display: block; animation: tabFadeIn 0.3s cubic-bezier(0.4, 0, 0.2, 1) forwards; }

@keyframes tabFadeIn { 
  from { opacity: 0; transform: translateY(15px); } 
  to { opacity: 1; transform: translateY(0); } 
}

/* Timeline Sự kiện */
.timeline-container { position: relative; margin: 10px 5px; padding-left: 35px; border-left: 2px dashed var(--border); }
.evt-row { position: relative; margin-bottom: 18px; display: flex; align-items: flex-start; }
.evt-badge-time { position: absolute; left: -47px; top: 2px; width: 24px; height: 24px; background: var(--turf); border: 2px solid var(--border); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 800; color: var(--gold); z-index: 2; }
.evt-badge-time.home-event { border-color: var(--gold); background: #1a5030; }
.evt-card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 10px 14px; flex: 1; display: flex; align-items: center; gap: 10px; box-shadow: 0 2px 6px rgba(0,0,0,0.15); }
.evt-card.home-side { border-left: 4px solid var(--gold); }
.evt-card.away-side { border-left: 4px solid var(--muted); }
.evt-card.neutral-side { border-left: 4px solid var(--text); background: rgba(0,0,0,0.2); }
.evt-icon-wrapper { font-size: 16px; width: 24px; text-align: center; }
.evt-main-info { flex: 1; }
.evt-p-name { font-size: 12px; font-weight: 700; color: var(--white); }
.evt-p-action { font-size: 10px; color: var(--muted); margin-top: 2px; font-weight: 500; }

/* Progress Bars Thống kê */
.stat-container { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 15px; }
.stat-item-block { margin-bottom: 16px; }
.stat-item-block:last-child { margin-bottom: 0; }
.stat-labels-row { display: flex; justify-content: space-between; align-items: center; font-size: 12px; font-weight: 700; margin-bottom: 5px; }
.stat-v-home { color: var(--gold); font-size: 13px; font-weight: 800; width: 40px; }
.stat-v-away { color: var(--white); font-size: 13px; width: 40px; text-align: right; }
.stat-v-lbl { color: var(--text); font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.3px; flex: 1; text-align: center; }
.stat-bar-graph-bg { height: 6px; background: rgba(0,0,0,0.3); border-radius: 3px; display: flex; overflow: hidden; border: 1px solid rgba(255,255,255,0.05); }
.stat-bar-fill-home { background: var(--gold); height: 100%; transition: width 0.4s ease; border-radius: 3px 0 0 3px; }
.stat-bar-fill-away { background: var(--muted); height: 100%; transition: width 0.4s ease; border-radius: 0 3px 3px 0; margin-left: auto; }

/* Đội hình */
.lineup-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.lineup-team-block { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 10px; }
.lineup-title-bar { font-size: 11px; font-weight: 800; color: var(--gold); text-align: center; text-transform: uppercase; padding-bottom: 8px; border-bottom: 1px solid var(--border); margin-bottom: 10px; }
.player-list-item { display: flex; align-items: center; gap: 8px; padding: 6px 4px; border-bottom: 1px solid rgba(255,255,255,0.03); }
.player-list-item:last-child { border-bottom: none; }
.player-jersey-circle { width: 20px; height: 20px; background: var(--turf); border: 1px solid var(--border); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 9px; font-weight: 800; color: var(--gold); flex-shrink: 0; }
.player-name-txt { font-size: 11px; font-weight: 600; color: var(--white); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; }
.bench-divider-lbl { text-align: center; font-size: 9px; font-weight: 700; color: var(--muted); text-transform: uppercase; margin: 12px 0 8px; padding: 2px 0; background: rgba(0,0,0,0.15); border-radius: 4px; letter-spacing: 0.5px; }

/* TOAST */
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--gold);border:1px solid var(--gold);border-radius:12px;padding:12px 20px;font-size:13px;font-weight:800;color:var(--pitch);z-index:999;transition:transform .3s cubic-bezier(.34,1.56,.64,1);white-space:nowrap;max-width:320px;text-align:center;box-shadow:0 4px 15px rgba(0,0,0,0.5)}
.toast.show{transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<header>
  <div class="header-top">
    <div class="logo">
      <span class="logo-ball">⚽</span>
      <div class="logo-text">
        <h1 id="app-title">WORLD CUP 2026</h1>
        <p>USA · Canada · Mexico</p>
      </div>
    </div>
    <div class="header-actions">
      <button class="icon-btn" onclick="openSettings()" id="lang-btn">🌐 EN</button>
      <button class="icon-btn" onclick="triggerManualRefresh()"><span class="spin" id="spin-icon">↻</span></button>
    </div>
  </div>
  <div class="tabs">
    <button class="tab active" onclick="switchTab('today',this)" id="tab-today">All</button>
    <button class="tab" onclick="switchTab('live',this)" id="tab-live">🔴 Live</button>
    <button class="tab" onclick="switchTab('upcoming',this)" id="tab-upcoming">Upcoming</button>
    <button class="tab" onclick="switchTab('results',this)" id="tab-results">Results</button>
    <button class="tab" onclick="switchTab('standings',this)" id="tab-standings">Standings</button>
  </div>
</header>

<div class="status-bar">
  <div class="live-indicator"><div class="live-dot" id="live-dot-ani"></div><span id="live-count">Live: 0</span></div>
  <span class="last-upd" id="last-upd">Connecting...</span>
</div>

<div class="content" id="main-content">
  <div style="text-align:center;padding:40px;color:var(--muted);"><div style="font-size:32px">⚽</div><p id="loading-txt" style="margin-top:12px;font-size:13px">Loading Data...</p></div>
</div>

<!-- SETTINGS MODAL -->
<div class="modal-overlay" id="modal-settings" onclick="bgClose(event)">
  <div class="modal-box" style="padding:18px 15px 36px;">
    <div class="modal-title"><span id="set-title">⚙️ Settings</span><button class="modal-close" onclick="closeModal('modal-settings')">✕</button></div>
    <div class="s-section">
      <div class="s-label" id="set-lang">🌍 Language</div>
      <div class="opt-grid" id="lang-grid"></div>
    </div>
    <div class="s-section">
      <div class="s-label" id="set-tz">🕐 Time Zone</div>
      <div class="tz-list" id="tz-grid"></div>
    </div>
  </div>
</div>

<!-- MATCH DETAIL MODAL (Redesigned with Sticky Header) -->
<div class="modal-overlay" id="modal-match" onclick="bgClose(event)">
  <div class="modal-box" id="modal-match-wrapper" style="padding:0; background: var(--primary-bg);">
    <!-- Nội dung sẽ được render qua JS -->
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ==========================================
// 1. DICTIONARY (BỘ TỪ ĐIỂN ĐA NGÔN NGỮ ĐÃ ĐỒNG BỘ)
// ==========================================
const LANGS = {
  vi: { 
    flag:'🇻🇳', label:'Tiếng Việt',
    tabs: { today:'Tất cả', live:'🔴 Trực tiếp', upcoming:'Sắp tới', results:'Kết quả', standings:'Bảng điểm' },
    status: { liveCount:'Trực tiếp', syncing:'Đang đồng bộ...', updated:'Cập nhật', loading:'Đang tải dữ liệu giải đấu...' },
    empty: { noMatch:'Hiện chưa có trận đấu nào.', noLive:'Hiện không có trận đấu nào đang diễn ra.', stdLoad:'Bảng điểm đang được cập nhật...' },
    std: { team:'Đội tuyển', played:'Trận', gd:'H/S', pts:'Điểm' },
    card: { day:'Ngày', stadium:'Sân vận động', upcoming:'SẮP ĐÁ' },
    modal: { details:'Chi tiết Trận đấu', events:'Sự kiện', stats:'Thống kê', lineups:'Đội hình', loading:'Đang lấy dữ liệu chi tiết...', fail:'Không thể tải dữ liệu.', assist:'Kiến tạo', unk:'Sự kiện' },
    inner: { noEvents:'Chưa có sự kiện quan trọng nào.', noStats:'Dữ liệu thống kê chưa sẵn sàng.', noLineups:'Đội hình chưa được công bố.', bench:'Dự bị', starters:'Đá chính' },
    stats: { possession:'Kiểm soát bóng', shots:'Sút bóng (Trúng đích)', passes:'Tổng đường chuyền', fouls:'Phạm lỗi', corners:'Phạt góc' },
    settings: { title:'⚙️ Cài đặt', lang:'🌍 Ngôn ngữ', tz:'🕐 Múi giờ', refreshMsg:'Đã làm mới dữ liệu hệ thống!' },
    evtTypes: { 'Kickoff':'Bắt đầu', 'Halftime':'Nghỉ giữa hiệp', 'Start Delay':'Tạm dừng', 'End Delay':'Tiếp tục', 'Full Time':'Kết thúc' }
  },
  en: { 
    flag:'🇬🇧', label:'English',
    tabs: { today:'All', live:'🔴 Live', upcoming:'Upcoming', results:'Results', standings:'Standings' },
    status: { liveCount:'Live', syncing:'Syncing...', updated:'Updated', loading:'Loading Tournament Data...' },
    empty: { noMatch:'No matches available.', noLive:'No live matches at the moment.', stdLoad:'Standings are being updated...' },
    std: { team:'Team', played:'P', gd:'GD', pts:'Pts' },
    card: { day:'Date', stadium:'Stadium', upcoming:'UPCOMING' },
    modal: { details:'Match Details', events:'Events', stats:'Stats', lineups:'Lineups', loading:'Fetching match details...', fail:'Could not load details.', assist:'Assist', unk:'Event' },
    inner: { noEvents:'No key events yet.', noStats:'Statistics not available.', noLineups:'Lineups not announced.', bench:'Bench', starters:'Starters' },
    stats: { possession:'Possession', shots:'Shots (On Target)', passes:'Total Passes', fouls:'Fouls Committed', corners:'Won Corners' },
    settings: { title:'⚙️ Settings', lang:'🌍 Language', tz:'🕐 Time Zone', refreshMsg:'Data refreshed!' },
    evtTypes: { 'Kickoff':'Kickoff', 'Halftime':'Halftime', 'Start Delay':'Start Delay', 'End Delay':'End Delay', 'Full Time':'Full Time' }
  }
};

let MATCHES = []; 
let STANDINGS = []; 
let currLang = 'vi'; 
let currTz = 7; 
let currTab = 'today';

const TZS = [
  {label:'Ho Chi Minh (ICT)', off: 7},
  {label:'New York (ET)', off: -4},
  {label:'London (GMT)', off: 0},
  {label:'Paris / Berlin', off: 2},
  {label:'Tokyo (JST)', off: 9}
];

// ==========================================
// 2. DATA FETCHING LOGIC
// ==========================================
async function fetchAllData() {
  const d = new Date();
  const t = LANGS[currLang];
  document.getElementById('last-upd').innerText = t.status.syncing;
  try {
    await Promise.all([fetchMatchData(), fetchStandingsData()]);
    document.getElementById('last-upd').innerText = `${t.status.updated} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
    renderContent();
  } catch(e) {
    console.error(e);
    document.getElementById('last-upd').innerText = "Error...";
  }
}

async function fetchMatchData() {
  const apiUrl = 'https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/scoreboard?dates=20260610-20260720&limit=200';
  const res = await fetch(apiUrl);
  const data = await res.json();
  
  if (data && data.events) {
    MATCHES = data.events.map(event => {
      const comp = event.competitions[0];
      const home = comp.competitors.find(c => c.homeAway === 'home');
      const away = comp.competitors.find(c => c.homeAway === 'away');

      let status = 'upcoming';
      const stateStr = event.status.type.state;
      if (stateStr === 'in') status = 'live';
      if (stateStr === 'post') status = 'results';

      const homeLogo = home.team.logo || 'https://a.espncdn.com/i/teamlogos/soccer/500/default-team-logo-500.png';
      const awayLogo = away.team.logo || 'https://a.espncdn.com/i/teamlogos/soccer/500/default-team-logo-500.png';

      return {
        id: event.id,
        home: home.team.shortDisplayName || home.team.name,
        homeId: home.team.id,
        homeFlag: `<img src="${homeLogo}" alt="${home.team.abbreviation}">`,
        away: away.team.shortDisplayName || away.team.name,
        awayId: away.team.id,
        awayFlag: `<img src="${awayLogo}" alt="${away.team.abbreviation}">`,
        group: event.season.slug || 'WC',
        status: status,
        homeScore: home.score || '0',
        awayScore: away.score || '0',
        time: event.status.displayClock,
        timestamp: new Date(event.date).getTime(),
        venue: comp.venue ? comp.venue.fullName : null
      };
    });
    MATCHES.sort((a, b) => a.timestamp - b.timestamp);
  }
}

async function fetchStandingsData() {
  try {
    const res = await fetch('https://site.api.espn.com/apis/v2/sports/soccer/fifa.world/standings');
    const data = await res.json();
    if (data && data.children) {
      STANDINGS = data.children.map(group => {
        let teamsArr = group.standings.entries.map(entry => {
          const getStat = (abbr) => {
            const s = entry.stats.find(x => x.abbreviation === abbr);
            return s ? parseFloat(s.value) : 0;
          };
          return {
            name: entry.team.shortDisplayName || entry.team.name,
            logo: entry.team.logos ? entry.team.logos[0].href : 'https://a.espncdn.com/i/teamlogos/soccer/500/default-team-logo-500.png',
            gp: getStat('GP'), gd: getStat('GD'), p: getStat('P')
          };
        });
        teamsArr.sort((a, b) => b.p - a.p || b.gd - a.gd);
        return { name: group.name, teams: teamsArr };
      });
    }
  } catch(e) { console.error("Error loading standings", e); }
}

// ==========================================
// 3. MAIN UI RENDER LOGIC
// ==========================================
function renderContent() {
  const container = document.getElementById('main-content');
  const t = LANGS[currLang];

  if (currTab === 'standings') {
    if (STANDINGS.length === 0) {
      container.innerHTML = `<div style="text-align:center;padding:40px;color:var(--muted);"><div style="font-size:32px">📊</div><p style="margin-top:12px;font-size:13px">${t.empty.stdLoad}</p></div>`;
      return;
    }

    container.innerHTML = STANDINGS.map(group => {
      const rows = group.teams.map((team, idx) => `
        <tr>
          <td>
            <div class="tc"><span class="rn ${idx < 2 ? 'q' : ''}">${idx + 1}</span>
              <img src="${team.logo}" style="width:18px;height:18px;object-fit:contain">
              <span style="font-weight:600;color:var(--white)">${team.name}</span>
            </div>
          </td>
          <td>${team.gp}</td><td>${team.gd > 0 ? '+'+team.gd : team.gd}</td><td class="pts">${team.p}</td>
        </tr>
      `).join('');

      return `<div class="std-card"><div class="std-hdr"><span class="std-grp">${group.name}</span></div>
          <table class="std-table"><thead><tr><th>${t.std.team}</th><th width="35">${t.std.played}</th><th width="35">${t.std.gd}</th><th width="35">${t.std.pts}</th></tr></thead><tbody>${rows}</tbody></table></div>`;
    }).join('');
    return;
  }
  
  let filtered = MATCHES;
  if(currTab !== 'today') filtered = MATCHES.filter(m => m.status === currTab);

  const liveCount = MATCHES.filter(m => m.status === 'live').length;
  document.getElementById('live-count').innerText = `${t.status.liveCount}: ${liveCount}`;
  document.getElementById('live-dot-ani').style.animationPlayState = liveCount > 0 ? 'running' : 'paused';

  if(filtered.length === 0) {
    let emptyMsg = currTab === 'live' ? t.empty.noLive : t.empty.noMatch;
    container.innerHTML = `<div style="text-align:center;padding:40px;color:var(--muted);"><div style="font-size:32px">🏟️</div><p style="margin-top:12px;font-size:13px;line-height:1.6;">${emptyMsg}</p></div>`;
    return;
  }

  let lastDateStr = '';
  
  container.innerHTML = filtered.map(m => {
    const isLive = m.status === 'live';
    const isDone = m.status === 'results';
    
    const dateObj = new Date(m.timestamp);
    const localTime = new Date(dateObj.getTime() + (currTz * 3600000) + (dateObj.getTimezoneOffset() * 60000));
    const dateStr = `${localTime.getDate()}/${localTime.getMonth()+1}/${localTime.getFullYear()}`;
    
    let dateHeaderHtml = '';
    if (dateStr !== lastDateStr && currTab === 'today') {
        dateHeaderHtml = `<div class="date-header">${t.card.day} ${dateStr}</div>`;
        lastDateStr = dateStr;
    }

    let tag = '', timeDisplay = '', scoreDisplay = '- : -';
    if(isLive) {
      tag = `<span class="s-tag live">LIVE</span>`;
      timeDisplay = `<div class="m-time lv">${m.time}</div>`;
      scoreDisplay = `${m.homeScore} <span class="score-sep">-</span> ${m.awayScore}`;
    } else if(isDone) {
      tag = `<span class="s-tag done">FT</span>`;
      timeDisplay = `<div class="m-time">Full Time</div>`;
      scoreDisplay = `${m.homeScore} <span class="score-sep">-</span> ${m.awayScore}`;
    } else {
      tag = `<span class="s-tag up">${t.card.upcoming}</span>`;
      timeDisplay = `<div class="m-time">${String(localTime.getHours()).padStart(2,'0')}:${String(localTime.getMinutes()).padStart(2,'0')}</div>`;
    }

    return `
      ${dateHeaderHtml}
      <div class="match-card ${isLive ? 'live-game' : ''}" onclick="showMatchDetail('${m.id}')">
        <div class="match-top">
          <div class="match-meta"><span class="grp-tag">${m.group}</span>${tag}</div>
          <div class="teams-row">
            <div class="team-home"><div class="t-flag">${m.homeFlag}</div><div class="t-name">${m.home}</div></div>
            <div class="score-block"><div class="score">${scoreDisplay}</div>${timeDisplay}</div>
            <div class="team-away"><div class="t-flag">${m.awayFlag}</div><div class="t-name">${m.away}</div></div>
          </div>
        </div>
        <div class="match-footer"><span class="venue-txt">📍 ${m.venue || t.card.stadium}</span></div>
      </div>
    `;
  }).join('');
}

// ==========================================
// 4. MATCH DETAILS MODAL (STICKY FIX & UNDEFINED FIX & SHOTS FIX)
// ==========================================
window.showMatchDetail = async function(id) {
  const m = MATCHES.find(x => x.id === id);
  if(!m) return;
  const t = LANGS[currLang];
  const isLive = m.status === 'live';
  const scoreDisplay = (m.status !== 'upcoming') ? `${m.homeScore} - ${m.awayScore}` : 'v';
  
  const dateObj = new Date(m.timestamp);
  const localTime = new Date(dateObj.getTime() + (currTz * 3600000) + (dateObj.getTimezoneOffset() * 60000));
  const timeStr = `${String(localTime.getHours()).padStart(2,'0')}:${String(localTime.getMinutes()).padStart(2,'0')} - ${localTime.getDate()}/${localTime.getMonth()+1}`;

  const wrapper = document.getElementById('modal-match-wrapper');

  // Khung Sticky Header (Luôn đứng im khi cuộn)
  const stickyHeaderHTML = `
    <div class="modal-sticky-header">
      <div class="modal-title"><span>${t.modal.details}</span><button class="modal-close" onclick="closeModal('modal-match')">✕</button></div>
      <div style="text-align:center; font-size:12px; color:var(--gold); margin-bottom: 15px;">🕒 ${timeStr}</div>
      <div class="det-teams">
        <div class="det-team"><div class="det-flag">${m.homeFlag}</div><div class="det-name">${m.home}</div></div>
        <div class="det-score-wrap">
          <div class="det-score">${scoreDisplay}</div>
          <div class="det-sub ${isLive?'lv':''}">${isLive ? m.time : (m.status==='results'?'FT': t.card.upcoming)}</div>
        </div>
        <div class="det-team"><div class="det-flag">${m.awayFlag}</div><div class="det-name">${m.away}</div></div>
      </div>
      <div class="md-tabs">
        <div class="md-tab active" onclick="switchModalTab('events', this)">${t.modal.events}</div>
        <div class="md-tab" onclick="switchModalTab('stats', this)">${t.modal.stats}</div>
        <div class="md-tab" onclick="switchModalTab('lineups', this)">${t.modal.lineups}</div>
      </div>
    </div>
  `;

  // Hiển thị trạng thái Loading ở phần Body
  wrapper.innerHTML = stickyHeaderHTML + `
    <div class="modal-scroll-body" id="modal-scroll-body">
      <div style="text-align:center; padding: 40px 0; color:var(--muted);"><span class="spin go">↻</span> ${t.modal.loading}</div>
    </div>
  `;
  document.getElementById('modal-match').classList.add('open');

  try {
    const res = await fetch(`https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/summary?event=${id}`);
    const summary = await res.json();

    // --- TAB 1: SỰ KIỆN (FIX LỖI UNDEFINED) ---
    let eventsHtml = `<div style="text-align:center;color:var(--muted);font-size:12px;padding:30px;">${t.inner.noEvents}</div>`;
    if(summary.keyEvents && summary.keyEvents.length > 0) {
      eventsHtml = `<div class="timeline-container">` + summary.keyEvents.map(evt => {
        // Fallback: Lấy text hợp lệ nhất, nếu là hệ thống thì đem dịch
        const rawType = evt.type ? evt.type.text : '';
        let eventName = evt.text || evt.shortText || (t.evtTypes[rawType] ? t.evtTypes[rawType] : rawType) || t.modal.unk;
        
        // Nếu sự kiện trống trơn, bỏ qua không hiển thị
        if(!eventName) return '';

        const isHome = evt.team && evt.team.id === m.homeId;
        const isAway = evt.team && evt.team.id === m.awayId;
        const alignClass = isHome ? 'home-side' : (isAway ? 'away-side' : 'neutral-side');
        
        let icon = '⚽';
        if(rawType.toLowerCase().includes('yellow')) icon = '🟨';
        if(rawType.toLowerCase().includes('red')) icon = '🟥';
        if(rawType.toLowerCase().includes('substitution')) icon = '🔄';

        // An toàn kiểm tra Kiến tạo (Assists)
        let assistHtml = '';
        if(rawType.includes('Goal') && evt.participants && evt.participants.length > 1 && evt.participants[1].athlete) {
            assistHtml = `<span>👟 ${t.modal.assist}: ${evt.participants[1].athlete.shortName}</span>`;
        } else if (rawType && !rawType.includes('Goal')) {
            assistHtml = `<span>${t.evtTypes[rawType] ? t.evtTypes[rawType] : rawType}</span>`;
        }

        return `
          <div class="evt-row">
            <div class="evt-badge-time ${isHome ? 'home-event' : ''}">${evt.clock.displayValue}</div>
            <div class="evt-card ${alignClass}">
              <div class="evt-icon-wrapper">${icon}</div>
              <div class="evt-main-info">
                <div class="evt-p-name">${eventName}</div>
                <div class="evt-p-action">${assistHtml}</div>
              </div>
            </div>
          </div>
        `;
      }).join('') + `</div>`;
    }

    // --- TAB 2: THỐNG KÊ (FIX LỖI CÚ SÚT = 0) ---
    let statsHtml = `<div style="text-align:center;color:var(--muted);font-size:12px;padding:30px;">${t.inner.noStats}</div>`;
    if(summary.boxscore && summary.boxscore.teams && summary.boxscore.teams.length === 2) {
      const t1 = summary.boxscore.teams[0]; 
      const t2 = summary.boxscore.teams[1];
      const t1IsHome = t1.team.id === m.homeId;
      const homeStats = t1IsHome ? t1.statistics : t2.statistics;
      const awayStats = t1IsHome ? t2.statistics : t1.statistics;

      // Hàm lấy thông số an toàn
      const getStat = (statsArray, key) => {
          const s = statsArray.find(x => x.name === key);
          return s ? s.displayValue : '0';
      };

      // Xử lý riêng biệt Cú sút (Total Shots) và Trúng đích (Shots On Target)
      const hShots = getStat(homeStats, 'totalShots');
      const hShotsOnTarget = getStat(homeStats, 'shotsOnTarget');
      const hShotsStr = `${hShots} (${hShotsOnTarget})`;

      const aShots = getStat(awayStats, 'totalShots');
      const aShotsOnTarget = getStat(awayStats, 'shotsOnTarget');
      const aShotsStr = `${aShots} (${aShotsOnTarget})`;

      const statItems = [
        { label: t.stats.possession, hVal: getStat(homeStats, 'possessionPct'), aVal: getStat(awayStats, 'possessionPct') },
        { label: t.stats.shots, hVal: hShotsStr, aVal: aShotsStr, isShots: true },
        { label: t.stats.passes, hVal: getStat(homeStats, 'totalPasses'), aVal: getStat(awayStats, 'totalPasses') },
        { label: t.stats.fouls, hVal: getStat(homeStats, 'foulsCommitted'), aVal: getStat(awayStats, 'foulsCommitted') },
        { label: t.stats.corners, hVal: getStat(homeStats, 'wonCorners'), aVal: getStat(awayStats, 'wonCorners') }
      ];

      statsHtml = `<div class="stat-container">` + statItems.map(item => {
        let hNum = parseInt(item.isShots ? hShots : item.hVal) || 0;
        let aNum = parseInt(item.isShots ? aShots : item.aVal) || 0;
        let total = hNum + aNum || 1; // Tránh chia 0
        let homePct = (hNum / total) * 100;
        let awayPct = (aNum / total) * 100;

        return `
          <div class="stat-item-block">
            <div class="stat-labels-row">
              <span class="stat-v-home">${item.hVal}</span>
              <span class="stat-v-lbl">${item.label}</span>
              <span class="stat-v-away">${item.aVal}</span>
            </div>
            <div class="stat-bar-graph-bg">
              <div class="stat-bar-fill-home" style="width: ${homePct}%"></div>
              <div class="stat-bar-fill-away" style="width: ${awayPct}%"></div>
            </div>
          </div>
        `;
      }).join('') + `</div>`;
    }

    // --- TAB 3: ĐỘI HÌNH ---
    let lineupsHtml = `<div style="text-align:center;color:var(--muted);font-size:12px;padding:30px;">${t.inner.noLineups}</div>`;
    if(summary.rosters && summary.rosters.length === 2) {
      const t1 = summary.rosters[0];
      const t2 = summary.rosters[1];
      const t1IsHome = t1.team.id === m.homeId;
      const homeRoster = t1IsHome ? t1.roster : t2.roster;
      const awayRoster = t1IsHome ? t2.roster : t1.roster;

      const buildRosterHTML = (title, rosterList) => {
        let starters = rosterList.filter(p => p.starter).map(p => `
          <div class="player-list-item">
            <div class="player-jersey-circle">${p.jersey||'-'}</div>
            <div class="player-name-txt">${p.athlete.displayName}</div>
          </div>
        `).join('');

        let bench = rosterList.filter(p => !p.starter).map(p => `
          <div class="player-list-item" style="opacity: 0.6;">
            <div class="player-jersey-circle" style="background:rgba(0,0,0,0.2); color:var(--muted);">${p.jersey||'-'}</div>
            <div class="player-name-txt" style="font-weight:normal;">${p.athlete.displayName}</div>
          </div>
        `).join('');

        return `
          <div class="lineup-team-block">
            <div class="lineup-title-bar">${title}</div>
            ${starters}
            <div class="bench-divider-lbl">${t.inner.bench}</div>
            ${bench}
          </div>
        `;
      };

      lineupsHtml = `
        <div class="lineup-grid">
          ${buildRosterHTML(m.home, homeRoster)}
          ${buildRosterHTML(m.away, awayRoster)}
        </div>
      `;
    }

    // Đẩy Body vào vùng cuộn
    document.getElementById('modal-scroll-body').innerHTML = `
      <div id="md-events" class="md-content active">${eventsHtml}</div>
      <div id="md-stats" class="md-content">${statsHtml}</div>
      <div id="md-lineups" class="md-content">${lineupsHtml}</div>
    `;

  } catch(e) {
    console.log("Error loading match details summary:", e);
    document.getElementById('modal-scroll-body').innerHTML = `<div style="text-align:center; color:var(--live); font-size:12px; padding:30px;">${t.modal.fail}</div>`;
  }
};

window.switchModalTab = function(tabId, btn) {
  // Thay đổi trạng thái nút Tab
  document.querySelectorAll('.md-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  
  // Ẩn/Hiện Content với Animation trượt mượt mà
  document.querySelectorAll('.md-content').forEach(c => c.classList.remove('active'));
  document.getElementById('md-' + tabId).classList.add('active');
  
  // Tự động cuộn lên đỉnh của vùng Scroll khi chuyển tab
  document.getElementById('modal-scroll-body').scrollTo({ top: 0, behavior: 'smooth' });
};

// ==========================================
// 5. SETTINGS & INTERACTIVE CORE UTILS
// ==========================================
window.switchTab = function(tab, btn) {
  currTab = tab;
  document.querySelectorAll('.header-top ~ .tabs .tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderContent();
};

window.openSettings = function() { document.getElementById('modal-settings').classList.add('open'); };
window.closeModal = function(id) { document.getElementById(id).classList.remove('open'); };
window.bgClose = function(e) { if(e.target.classList.contains('modal-overlay')) e.target.classList.remove('open'); };

window.setLang = function(k) { currLang = k; buildSettings(); updateUI(); closeModal('modal-settings'); };
window.setTz = function(off) { currTz = off; buildSettings(); renderContent(); closeModal('modal-settings'); };

window.triggerManualRefresh = function() {
  const spin = document.getElementById('spin-icon');
  spin.classList.add('go');
  fetchAllData().then(() => { setTimeout(() => spin.classList.remove('go'), 500); showToast(LANGS[currLang].settings.refreshMsg); });
};

function buildSettings() {
  document.getElementById('lang-grid').innerHTML = Object.keys(LANGS).map(k => `<button class="opt-btn ${k===currLang?'sel':''}" onclick="setLang('${k}')">${LANGS[k].flag} ${LANGS[k].label}</button>`).join('');
  document.getElementById('tz-grid').innerHTML = TZS.map(tz => `<div class="tz-item ${tz.off===currTz?'sel':''}" onclick="setTz(${tz.off})"><span>${tz.label}</span><span class="tz-off">UTC${tz.off>=0?'+':''}${tz.off}</span></div>`).join('');
}

function updateUI() {
  const t = LANGS[currLang];
  document.getElementById('set-title').innerText = t.settings.title;
  document.getElementById('set-lang').innerText = t.settings.lang;
  document.getElementById('set-tz').innerText = t.settings.tz;

  document.getElementById('lang-btn').innerHTML = `🌐 ${currLang.toUpperCase()}`;
  document.getElementById('tab-today').innerText = t.tabs.today;
  document.getElementById('tab-live').innerText = t.tabs.live;
  document.getElementById('tab-upcoming').innerText = t.tabs.upcoming;
  document.getElementById('tab-results').innerText = t.tabs.results;
  document.getElementById('tab-standings').innerText = t.tabs.standings;

  const loadingTxt = document.getElementById('loading-txt');
  if (loadingTxt) loadingTxt.innerText = t.status.loading;
  
  if (MATCHES.length > 0 || STANDINGS.length > 0) renderContent();
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.innerText = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

document.addEventListener("DOMContentLoaded", () => {
  buildSettings();
  updateUI();
  fetchAllData();
  setInterval(fetchAllData, 60000); 
});
</script>
</body>
</html>
