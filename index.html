<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live World Cup Match Timeline</title>
    <style>
        :root {
            --primary-bg: #111827;
            --card-bg: #1f2937;
            --accent-color: #ef4444;
            --text-main: #ffffff;
            --text-muted: #9ca3af;
            --border-color: #374151;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #0b0f17;
            color: var(--text-main);
            display: flex;
            justify-content: center;
        }

        /* Mobile Container Wrapper */
        .mobile-container {
            width: 100%;
            max-width: 480px;
            min-height: 100vh;
            background-color: var(--primary-bg);
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* Live Header Scoreboard */
        .scoreboard {
            background: linear-gradient(180deg, #1e3a8a 0%, var(--card-bg) 100%);
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid var(--border-color);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .live-badge {
            background-color: var(--accent-color);
            color: white;
            font-size: 12px;
            font-weight: bold;
            padding: 4px 8px;
            border-radius: 12px;
            text-transform: uppercase;
            display: inline-block;
            margin-bottom: 10px;
            animation: blink 1.5s infinite;
        }

        @keyframes blink {
            0% { opacity: 1; }
            50% { opacity: 0.4; }
            100% { opacity: 1; }
        }

        .match-status {
            font-size: 14px;
            color: #34d399;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .teams-container {
            display: flex;
            justify-content: space-around;
            align-items: center;
        }

        .team {
            flex: 1;
        }

        .team-flag {
            font-size: 32px;
            margin-bottom: 5px;
        }

        .team-name {
            font-size: 16px;
            font-weight: bold;
        }

        .score {
            font-size: 36px;
            font-weight: 800;
            flex: 1;
            letter-spacing: 2px;
        }

        /* Timeline Section */
        .timeline-section {
            padding: 20px;
            flex-grow: 1;
        }

        .timeline-title {
            font-size: 16px;
            color: var(--text-muted);
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .timeline {
            position: relative;
            border-left: 2px solid var(--border-color);
            margin-left: 20px;
            padding-left: 20px;
        }

        .timeline-item {
            position: relative;
            margin-bottom: 25px;
            animation: slideIn 0.4s ease-out;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Timeline Dot/Icon wrapper */
        .timeline-icon {
            position: absolute;
            left: -31px;
            top: 2px;
            background: var(--primary-bg);
            border: 2px solid var(--border-color);
            border-radius: 50%;
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
        }

        .timeline-content {
            background-color: var(--card-bg);
            padding: 12px 16px;
            border-radius: 8px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .timeline-time {
            font-size: 12px;
            font-weight: bold;
            color: var(--accent-color);
            margin-bottom: 4px;
        }

        .timeline-detail {
            font-size: 15px;
            font-weight: 500;
        }

        .timeline-player {
            font-size: 13px;
            color: var(--text-muted);
            margin-top: 2px;
        }
    </style>
</head>
<body>

    <div class="mobile-container">
        <div class="scoreboard">
            <span class="live-badge">● LIVE</span>
            <div class="match-status" id="match-clock">Second Half 72'</div>
            
            <div class="teams-container">
                <div class="team">
                    <div class="team-flag">🇧🇷</div>
                    <div class="team-name">Brazil</div>
                </div>
                <div class="score" id="match-score">2 - 1</div>
                <div class="team">
                    <div class="team-flag">🇫🇷</div>
                    <div class="team-name">France</div>
                </div>
            </div>
        </div>

        <div class="timeline-section">
            <div class="timeline-title">Match Timeline</div>
            <div class="timeline" id="timeline-container">
                <div class="timeline-item">
                    <div class="timeline-icon">🟨</div>
                    <div class="timeline-content">
                        <div class="timeline-time">68'</div>
                        <div class="timeline-detail">Yellow Card</div>
                        <div class="timeline-player">Casemiro (Brazil)</div>
                    </div>
                </div>
                <div class="timeline-item">
                    <div class="timeline-icon">⚽</div>
                    <div class="timeline-content">
                        <div class="timeline-time">55'</div>
                        <div class="timeline-detail">GOAL! France</div>
                        <div class="timeline-player">K. Mbappé (Assist: A. Griezmann)</div>
                    </div>
                </div>
                <div class="timeline-item">
                    <div class="timeline-icon">⚽</div>
                    <div class="timeline-content">
                        <div class="timeline-time">41'</div>
                        <div class="timeline-detail">GOAL! Brazil</div>
                        <div class="timeline-player">Vinícius Jr. (Penalty)</div>
                    </div>
                </div>
                <div class="timeline-item">
                    <div class="timeline-icon">⚽</div>
                    <div class="timeline-content">
                        <div class="timeline-time">14'</div>
                        <div class="timeline-detail">GOAL! Brazil</div>
                        <div class="timeline-player">Rodrygo (Assist: Neymar Jr.)</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Simulated real-time live feed data
        const liveUpdates = [
            {
                clock: "Second Half 78'",
                score: "2 - 1",
                event: { icon: "🔄", time: "78'", detail: "Substitution (France)", player: "In: O. Dembélé / Out: K. Coman" }
            },
            {
                clock: "Second Half 83'",
                score: "2 - 1",
                event: { icon: "🟨", time: "83'", detail: "Yellow Card", player: "L. Hernandez (France)" }
            },
            {
                clock: "Second Half 88'",
                score: "3 - 1",
                event: { icon: "⚽", time: "88'", detail: "GOAL! Brazil", player: "Neymar Jr. (Direct Free Kick)" }
            },
            {
                clock: "Full Time 90+4'",
                score: "3 - 1",
                event: { icon: "🏁", time: "90+4'", detail: "Match Finished", player: "Brazil wins and advances!" }
            }
        ];

        let eventIndex = 0;
        const timelineContainer = document.getElementById('timeline-container');
        const scoreDisplay = document.getElementById('match-score');
        const clockDisplay = document.getElementById('match-clock');

        // Function to simulate incoming live feed events every 7 seconds
        function simulateLiveUpdate() {
            if (eventIndex < liveUpdates.length) {
                const currentData = liveUpdates[eventIndex];
                
                // 1. Update overall score and clock text
                clockDisplay.innerText = currentData.clock;
                scoreDisplay.innerText = currentData.score;
                
                // 2. Format and insert the new event at the top of the timeline list
                const newEvent = currentData.event;
                const itemHTML = `
                    <div class="timeline-item">
                        <div class="timeline-icon">${newEvent.icon}</div>
                        <div class="timeline-content">
                            <div class="timeline-time">${newEvent.time}</div>
                            <div class="timeline-detail">${newEvent.detail}</div>
                            <div class="timeline-player">${newEvent.player}</div>
                        </div>
                    </div>
                `;
                
                timelineContainer.insertAdjacentHTML('afterbegin', itemHTML);
                eventIndex++;
            } else {
                clearInterval(liveInterval); // Stop simulation when match finishes
                document.querySelector('.live-badge').style.background = '#4b5563';
                document.querySelector('.live-badge').innerText = 'FINISHED';
            }
        }

        // Trigger updates every 7 seconds to mimic live events incoming
        const liveInterval = setInterval(simulateLiveUpdate, 7000);
    </script>
</body>
</html>
