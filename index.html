<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>⚽ World Cup 2026 Live</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --pitch:#0a2e1a;--grass:#0d3d24;--turf:#134d2e;
  --gold:#f5c842;--white:#f0f4f0;--muted:#8aaa96;
  --card:#0f3d22;--live:#e53935;--live-glow:rgba(229,57,53,.3);
  --done:#4caf70;--up:#5b8c71;--border:#1e5434;--text:#d6ead0;
}
body{font-family:'Inter',sans-serif;background:var(--pitch);color:var(--text);min-height:100vh;max-width:480px;margin:0 auto;padding-bottom:40px}

/* HEADER & TABS */
header{background:var(--grass);padding:13px 13px 10px;border-bottom:2px solid var(--border);position:sticky;top:0;z-index:100}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.logo{display:flex;align-items:center;gap:8px}
.logo-ball{font-size:22px}
.logo-text h1{font-size:15px;font-weight:900;color:var(--gold);letter-spacing:-.3px;line-height:1}
.logo-text p{font-size:9px;color:var(--muted);font-weight:500;text-transform:uppercase;letter-spacing:1px}
.header-actions{display:flex;gap:5px}
.icon-btn{background:var(--turf);border:1px solid var(--border);color:var(--gold);border-radius:8px;padding:6px 9px;font-size:12px;cursor:pointer;display:flex;align-items:center;gap:3px;font-weight:600;transition:all .2s;white-space:nowrap}
.icon-btn:active{transform:scale(.92)}
.spin{display:inline-block;line-height:1}
.spin.go{animation:spin .6s linear}
@keyframes spin{to{transform:rotate(360deg)}}
.tabs{display:flex;gap:5px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px;}
.tabs::-webkit-scrollbar{display:none}
.tab{background:transparent;border:1px solid var(--border);color:var(--muted);border-radius:20px;padding:5px 12px;font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap;flex-shrink:0;transition:all .2s}
.tab.active{background:var(--gold);border-color:var(--gold);color:var(--pitch)}

/* STATUS */
.status-bar{padding:6px 13px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);background:var(--grass)}
.live-indicator{display:flex;align-items:center;gap:5px;font-size:11px;font-weight:700;color:var(--live)}
.live-dot{width:7px;height:7px;background:var(--live);border-radius:50%;animation:pulse 1.5s infinite}
@keyframes pulse{0%{box-shadow:0 0 0 0 var(--live-glow)}70%{box-shadow:0 0 0 6px transparent}100%{box-shadow:0 0 0 0 transparent}}
.last-upd{font-size:10px;color:var(--muted)}

/* CONTENT */
.content{padding:10px 11px}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.78);z-index:200;align-items:flex-end;justify-content:center}
.modal-overlay.open{display:flex}
.modal-box{background:var(--grass);border-radius:18px 18px 0 0;border:1px solid var(--border);border-bottom:none;width:100%;max-width:480px;max-height:85vh;overflow-y:auto;padding:18px 15px 36px;animation:slideup .25s ease}
@keyframes slideup{from{transform:translateY(60px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-title{font-size:15px;font-weight:800;color:var(--gold);margin-bottom:15px;display:flex;justify-content:space-between;align-items:center}
.modal-close{background:var(--turf);border:none;color:var(--muted);border-radius:7px;padding:4px 9px;font-size:15px;cursor:pointer}

/* SETTINGS */
.s-label{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:7px}
.s-section{margin-bottom:18px}
.opt-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.opt-btn{background:var(--turf);border:2px solid var(--border);color:var(--text);border-radius:9px;padding:9px 10px;font-size:12px;font-weight:600;cursor:pointer;text-align:center;transition:all .15s;width:100%}
.opt-btn.sel{border-color:var(--gold);color:var(--gold);background:#1a5030}
.tz-list{display:flex;flex-direction:column;gap:4px;max-height:200px;overflow-y:auto}
.tz-item{background:var(--turf);border:2px solid var(--border);color:var(--text);border-radius:9px;padding:8px 11px;font-size:12px;font-weight:600;cursor:pointer;display:flex;justify-content:space-between;align-items:center;}
.tz-item.sel{border-color:var(--gold);color:var(--gold)}

/* MATCH CARD */
.match-card{background:var(--card);border-radius:13px;border:1px solid var(--border);margin-bottom:7px;overflow:hidden;cursor:pointer;}
.match-card.live-game{border-color:var(--live);box-shadow:0 0 14px rgba(229,57,53,.18)}
.match-top{padding:11px 12px 9px}
.match-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.grp-tag{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.4px}
.s-tag{font-size:10px;font-weight:700;padding:2px 8px;border-radius:8px}
.s-tag.live{background:var(--live);color:#fff;animation:blink 1.5s infinite}
.s-tag.done{background:rgba(76,175,112,.2);color:var(--done)}
.s-tag.up{background:rgba(91,140,113,.2);color:var(--up)}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.65}}
.teams-row{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:6px}
.team-home{text-align:right}.team-away{text-align:left}

.t-flag img {width: 32px; height: 32px; object-fit: contain; margin-bottom: 3px;}
.det-flag img {width: 60px; height: 60px; object-fit: contain;}

.t-name{font-size:11px;font-weight:700;color:var(--white);line-height:1.2}
.score-block{text-align:center}
.score{font-size:26px;font-weight:900;color:var(--gold);letter-spacing:-1px;line-height:1}
.m-time{font-size:10px;color:var(--muted);margin-top:3px;font-weight:500}
.m-time.lv{color:var(--live);font-weight:700}
.match-footer{padding:6px 12px 8px;display:flex;align-items:center;justify-content:space-between;border-top:1px solid var(--border);background:rgba(0,0,0,.1);gap:5px}
.venue-txt{font-size:10px;color:var(--muted);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* STANDINGS TABLE (BẢNG ĐIỂM) */
.std-card{background:var(--card);border-radius:13px;border:1px solid var(--border);margin-bottom:12px;overflow:hidden}
.std-hdr{padding:9px 12px;border-bottom:1px solid var(--border); background:rgba(0,0,0,0.15)}
.std-grp{font-size:13px;font-weight:800;color:var(--gold);text-transform:uppercase;}
.std-table{width:100%;border-collapse:collapse}
.std-table th{font-size:9px;font-weight:700;color:var(--muted);text-transform:uppercase;padding:8px 8px;text-align:center;background:rgba(0,0,0,0.2)}
.std-table th:first-child{text-align:left}
.std-table td{font-size:12px;padding:9px 8px;text-align:center;border-top:1px solid rgba(30,84,52,.5)}
.std-table td:first-child{text-align:left}
.tc{display:flex;align-items:center;gap:8px}
.rn{font-size:10px;color:var(--muted);width:14px;text-align:right}
.rn.q{color:var(--done);font-weight:800}
.pts{font-weight:800;color:var(--gold);font-size:13px;}

/* DETAIL MODAL */
.det-teams{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;gap:8px}
.det-team{flex:1;text-align:center}
.det-name{font-size:13px;font-weight:700;color:var(--white);margin-top:4px}
.det-score-wrap{text-align:center}
.det-score{font-size:36px;font-weight:900;color:var(--gold);letter-spacing:-2px;line-height:1}
.det-sub{font-size:11px;color:var(--muted);margin-top:3px}
.det-sub.lv{color:var(--live);font-weight:700}

/* TOAST */
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--gold);border:1px solid var(--gold);border-radius:12px;padding:12px 20px;font-size:13px;font-weight:800;color:var(--pitch);z-index:999;transition:transform .3s cubic-bezier(.34,1.56,.64,1);white-space:nowrap;max-width:320px;text-align:center;box-shadow:0 4px 15px rgba(0,0,0,0.5)}
.toast.show{transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<header>
  <div class="header-top">
    <div class="logo">
      <span class="logo-ball">⚽</span>
      <div class="logo-text">
        <h1 id="app-title">WORLD CUP 2026</h1>
        <p>USA · Canada · Mexico</p>
      </div>
    </div>
    <div class="header-actions">
      <button class="icon-btn" onclick="openSettings()" id="lang-btn">🌐 EN</button>
      <button class="icon-btn" onclick="triggerManualRefresh()"><span class="spin" id="spin-icon">↻</span></button>
    </div>
  </div>
  <div class="tabs">
    <button class="tab active" onclick="switchTab('today',this)" id="tab-today">Tất cả</button>
    <button class="tab" onclick="switchTab('live',this)" id="tab-live">🔴 Trực tiếp</button>
    <button class="tab" onclick="switchTab('upcoming',this)" id="tab-upcoming">Sắp tới</button>
    <button class="tab" onclick="switchTab('results',this)" id="tab-results">Kết quả</button>
    <button class="tab" onclick="switchTab('standings',this)" id="tab-standings">Bảng điểm</button>
  </div>
</header>

<div class="status-bar">
  <div class="live-indicator"><div class="live-dot" id="live-dot-ani"></div><span id="live-count">Live: 0</span></div>
  <span class="last-upd" id="last-upd">Đang kết nối...</span>
</div>

<div class="content" id="main-content">
  <div style="text-align:center;padding:40px;color:var(--muted);"><div style="font-size:32px">⚽</div><p style="margin-top:12px;font-size:13px">Đang tải dữ liệu World Cup...</p></div>
</div>

<div class="modal-overlay" id="modal-settings" onclick="bgClose(event)">
  <div class="modal-box">
    <div class="modal-title"><span>⚙️ Cài đặt</span><button class="modal-close" onclick="closeModal('modal-settings')">✕</button></div>
    <div class="s-section">
      <div class="s-label">🌍 Ngôn ngữ</div>
      <div class="opt-grid" id="lang-grid"></div>
    </div>
    <div class="s-section">
      <div class="s-label">🕐 Múi giờ</div>
      <div class="tz-list" id="tz-grid"></div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-match" onclick="bgClose(event)">
  <div class="modal-box" id="modal-match-body"></div>
</div>

<div class="toast" id="toast"></div>

<script>
// ==========================================
// 1. STATE & CONSTANTS
// ==========================================
let MATCHES = []; 
let STANDINGS = []; // Chứa dữ liệu bảng điểm
let currLang = 'vi'; 
let currTz = 7; 
let currTab = 'today';

const LANGS = {
  vi: { flag:'🇻🇳', label:'Tiếng Việt', today:'Tất cả', live:'🔴 Trực tiếp', upcoming:'Sắp tới', results:'Kết quả', standings:'Bảng điểm', noMatch:'Hiện chưa có trận đấu nào.', noLive:'Đang là ban đêm tại châu Mỹ.\nCác trận đấu thường đá vào rạng sáng giờ Việt Nam.' },
  en: { flag:'🇬🇧', label:'English', today:'All', live:'🔴 Live', upcoming:'Upcoming', results:'Results', standings:'Standings', noMatch:'No matches available.', noLive:'It is currently nighttime in the Americas.\nNo live matches at this hour.' }
};

const TZS = [
  {label:'Ho Chi Minh (ICT)', off: 7},
  {label:'New York (ET)', off: -4},
  {label:'London (GMT)', off: 0},
  {label:'Paris / Berlin', off: 2},
  {label:'Tokyo (JST)', off: 9}
];

// ==========================================
// 2. DATA FETCHING LOGIC
// ==========================================
async function fetchAllData() {
  const d = new Date();
  document.getElementById('last-upd').innerText = `Syncing...`;
  try {
    // Gọi song song cả API Tỷ số và API Bảng điểm
    await Promise.all([fetchMatchData(), fetchStandingsData()]);
    document.getElementById('last-upd').innerText = `Cập nhật ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
    renderContent();
  } catch(e) {
    console.error(e);
    document.getElementById('last-upd').innerText = "Đang kết nối lại...";
  }
}

async function fetchMatchData() {
  const res = await fetch('https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/scoreboard');
  const data = await res.json();
  
  MATCHES = data.events.map(event => {
    const comp = event.competitions[0];
    const home = comp.competitors.find(c => c.homeAway === 'home');
    const away = comp.competitors.find(c => c.homeAway === 'away');

    let status = 'upcoming';
    const stateStr = event.status.type.state;
    if (stateStr === 'in') status = 'live';
    if (stateStr === 'post') status = 'results';

    const homeLogo = home.team.logo || 'https://a.espncdn.com/i/teamlogos/soccer/500/default-team-logo-500.png';
    const awayLogo = away.team.logo || 'https://a.espncdn.com/i/teamlogos/soccer/500/default-team-logo-500.png';

    return {
      id: event.id,
      home: home.team.shortDisplayName || home.team.name,
      homeFlag: `<img src="${homeLogo}" alt="${home.team.abbreviation}">`,
      away: away.team.shortDisplayName || away.team.name,
      awayFlag: `<img src="${awayLogo}" alt="${away.team.abbreviation}">`,
      group: event.season.slug || 'WC',
      status: status,
      homeScore: home.score,
      awayScore: away.score,
      time: event.status.displayClock,
      timestamp: new Date(event.date).getTime(),
      venue: comp.venue ? comp.venue.fullName : 'Sân vận động'
    };
  });
}

async function fetchStandingsData() {
  try {
    const res = await fetch('https://site.api.espn.com/apis/v2/sports/soccer/fifa.world/standings');
    const data = await res.json();
    if (data && data.children) {
      STANDINGS = data.children.map(group => {
        return {
          name: group.name,
          teams: group.standings.entries.map(entry => {
            const getStat = (abbr) => {
              const s = entry.stats.find(x => x.abbreviation === abbr);
              return s ? s.value : 0;
            };
            return {
              name: entry.team.shortDisplayName || entry.team.name,
              logo: entry.team.logos ? entry.team.logos[0].href : 'https://a.espncdn.com/i/teamlogos/soccer/500/default-team-logo-500.png',
              gp: getStat('GP'), // Số trận đã đá
              gd: getStat('GD'), // Hiệu số
              p: getStat('P')    // Điểm số
            };
          })
        };
      });
    }
  } catch(e) {
    console.error("Lỗi khi tải bảng điểm:", e);
  }
}

// ==========================================
// 3. UI RENDER LOGIC
// ==========================================
function renderContent() {
  const container = document.getElementById('main-content');
  const t = LANGS[currLang];

  // Nếu người dùng đang chọn tab Bảng điểm -> Render Bảng điểm
  if (currTab === 'standings') {
    if (STANDINGS.length === 0) {
      container.innerHTML = `<div style="text-align:center;padding:40px;color:var(--muted);"><div style="font-size:32px">📊</div><p style="margin-top:12px;font-size:13px">Bảng điểm đang được cập nhật...</p></div>`;
      return;
    }

    container.innerHTML = STANDINGS.map(group => {
      const rows = group.teams.map((team, idx) => `
        <tr>
          <td>
            <div class="tc">
              <span class="rn ${idx < 2 ? 'q' : ''}">${idx + 1}</span>
              <img src="${team.logo}" style="width:18px;height:18px;object-fit:contain" onerror="this.src='https://a.espncdn.com/i/teamlogos/soccer/500/default-team-logo-500.png'">
              <span style="font-weight:600;color:var(--white)">${team.name}</span>
            </div>
          </td>
          <td>${team.gp}</td>
          <td>${team.gd > 0 ? '+'+team.gd : team.gd}</td>
          <td class="pts">${team.p}</td>
        </tr>
      `).join('');

      return `
        <div class="std-card">
          <div class="std-hdr"><span class="std-grp">${group.name}</span></div>
          <table class="std-table">
            <thead>
              <tr>
                <th>Đội tuyển</th>
                <th width="35">Trận</th>
                <th width="35">H/S</th>
                <th width="35">Điểm</th>
              </tr>
            </thead>
            <tbody>${rows}</tbody>
          </table>
        </div>
      `;
    }).join('');
    return;
  }
  
  // Nếu không phải Bảng điểm -> Render Trận đấu
  let filtered = MATCHES;
  if(currTab !== 'today') filtered = MATCHES.filter(m => m.status === currTab);

  const liveCount = MATCHES.filter(m => m.status === 'live').length;
  document.getElementById('live-count').innerText = `Live: ${liveCount}`;
  document.getElementById('live-dot-ani').style.animationPlayState = liveCount > 0 ? 'running' : 'paused';

  if(filtered.length === 0) {
    let emptyMsg = t.noMatch;
    // Thông báo giải thích rõ vì sao không có trận Live
    if(currTab === 'live') emptyMsg = t.noLive; 
    
    container.innerHTML = `<div style="text-align:center;padding:40px;color:var(--muted);"><div style="font-size:32px">🏟️</div><p style="margin-top:12px;font-size:13px;line-height:1.6;white-space:pre-line;">${emptyMsg}</p></div>`;
    return;
  }

  container.innerHTML = filtered.map(m => {
    const isLive = m.status === 'live';
    const isDone = m.status === 'results';
    
    let tag = '', timeDisplay = '', scoreDisplay = '- : -';
    if(isLive) {
      tag = `<span class="s-tag live">LIVE</span>`;
      timeDisplay = `<div class="m-time lv">${m.time}</div>`;
      scoreDisplay = `${m.homeScore} <span class="score-sep">-</span> ${m.awayScore}`;
    } else if(isDone) {
      tag = `<span class="s-tag done">FT</span>`;
      timeDisplay = `<div class="m-time">Full Time</div>`;
      scoreDisplay = `${m.homeScore} <span class="score-sep">-</span> ${m.awayScore}`;
    } else {
      tag = `<span class="s-tag up">UPCOMING</span>`;
      const dateObj = new Date(m.timestamp);
      const localTime = new Date(dateObj.getTime() + (currTz * 3600000) + (dateObj.getTimezoneOffset() * 60000));
      timeDisplay = `<div class="m-time">${String(localTime.getHours()).padStart(2,'0')}:${String(localTime.getMinutes()).padStart(2,'0')}</div>`;
    }

    return `
      <div class="match-card ${isLive ? 'live-game' : ''}" onclick="showMatchDetail('${m.id}')">
        <div class="match-top">
          <div class="match-meta"><span class="grp-tag">${m.group}</span>${tag}</div>
          <div class="teams-row">
            <div class="team-home"><div class="t-flag">${m.homeFlag}</div><div class="t-name">${m.home}</div></div>
            <div class="score-block"><div class="score">${scoreDisplay}</div>${timeDisplay}</div>
            <div class="team-away"><div class="t-flag">${m.awayFlag}</div><div class="t-name">${m.away}</div></div>
          </div>
        </div>
        <div class="match-footer">
          <span class="venue-txt">📍 ${m.venue}</span>
        </div>
      </div>
    `;
  }).join('');
}

// ==========================================
// 4. INTERACTIVE FUNCTIONS
// ==========================================
window.switchTab = function(tab, btn) {
  currTab = tab;
  document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderContent();
};

window.openSettings = function() { document.getElementById('modal-settings').classList.add('open'); };
window.closeModal = function(id) { document.getElementById(id).classList.remove('open'); };
window.bgClose = function(e) { if(e.target.classList.contains('modal-overlay')) e.target.classList.remove('open'); };

window.setLang = function(k) {
  currLang = k; 
  buildSettings(); 
  updateUI(); 
  closeModal('modal-settings');
};

window.setTz = function(off) {
  currTz = off; 
  buildSettings(); 
  renderContent(); 
  closeModal('modal-settings');
};

window.triggerManualRefresh = function() {
  const spin = document.getElementById('spin-icon');
  spin.classList.add('go');
  fetchAllData().then(() => {
    setTimeout(() => spin.classList.remove('go'), 500);
    showToast("Dữ liệu đã được làm mới!");
  });
};

window.showMatchDetail = function(id) {
  const m = MATCHES.find(x => x.id === id);
  if(!m) return;
  const isLive = m.status === 'live';
  const scoreDisplay = (m.status !== 'upcoming') ? `${m.homeScore} - ${m.awayScore}` : 'v';
  
  document.getElementById('modal-match-body').innerHTML = `
    <div class="modal-title"><span>Chi tiết</span><button class="modal-close" onclick="closeModal('modal-match')">✕</button></div>
    <div class="det-teams">
      <div class="det-team"><div class="det-flag">${m.homeFlag}</div><div class="det-name">${m.home}</div></div>
      <div class="det-score-wrap">
        <div class="det-score">${scoreDisplay}</div>
        <div class="det-sub ${isLive?'lv':''}">${isLive ? m.time : (m.status==='results'?'FT':'Sắp đá')}</div>
      </div>
      <div class="det-team"><div class="det-flag">${m.awayFlag}</div><div class="det-name">${m.away}</div></div>
    </div>
    <div style="text-align:center; margin-top:20px; font-size:12px; color:var(--muted)">📍 ${m.venue}</div>
  `;
  document.getElementById('modal-match').classList.add('open');
};

// ==========================================
// 5. INITIALIZATION
// ==========================================
function buildSettings() {
  document.getElementById('lang-grid').innerHTML = Object.keys(LANGS).map(k => 
    `<button class="opt-btn ${k===currLang?'sel':''}" onclick="setLang('${k}')">${LANGS[k].flag} ${LANGS[k].label}</button>`
  ).join('');

  document.getElementById('tz-grid').innerHTML = TZS.map(t => 
    `<div class="tz-item ${t.off===currTz?'sel':''}" onclick="setTz(${t.off})">
      <span>${t.label}</span><span class="tz-off">UTC${t.off>=0?'+':''}${t.off}</span>
    </div>`
  ).join('');
}

function updateUI() {
  const t = LANGS[currLang];
  document.getElementById('lang-btn').innerHTML = `🌐 ${currLang.toUpperCase()}`;
  document.getElementById('tab-today').innerText = t.today;
  document.getElementById('tab-live').innerText = t.live;
  document.getElementById('tab-upcoming').innerText = t.upcoming;
  document.getElementById('tab-results').innerText = t.results;
  document.getElementById('tab-standings').innerText = t.standings;
  renderContent();
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.innerText = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

document.addEventListener("DOMContentLoaded", () => {
  buildSettings();
  updateUI();
  fetchAllData();
  // Tự động làm mới cả Tỷ số & Bảng điểm mỗi 60 giây
  setInterval(fetchAllData, 60000); 
});
</script>
</body>
</html>
